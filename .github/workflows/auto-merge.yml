name: Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge eligible pull request
    if: github.event_name != 'workflow_run' || github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge when checks and approval are satisfied
        uses: actions/github-script@v7
        with:
          script: |
            async function getPullRequestNumber() {
              if (context.eventName === "workflow_run") {
                const prs = context.payload.workflow_run.pull_requests || [];
                return prs.length > 0 ? prs[0].number : null;
              }

              return context.payload.pull_request?.number ?? context.payload.review?.pull_request_url?.split("/").pop() ?? null;
            }

            const pullNumber = await getPullRequestNumber();
            if (!pullNumber) {
              core.info("No pull request associated with this event.");
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(pullNumber),
            });

            if (pr.state !== "open" || pr.draft) {
              core.info("Pull request is not open and ready.");
              return;
            }

            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: pr.head.sha,
              per_page: 100,
            });

            const ciRun = runs.workflow_runs.find((run) => run.name === "CI");
            if (!ciRun || ciRun.conclusion !== "success") {
              core.info("CI has not completed successfully for the current HEAD SHA.");
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestStates = new Map();
            for (const review of reviews) {
              if (!review.user) {
                continue;
              }

              latestStates.set(review.user.login, review.state);
            }

            const approvals = [...latestStates.values()].filter((state) => state === "APPROVED").length;
            if (approvals < 1) {
              core.info("At least one approval is still required.");
              return;
            }

            if (pr.mergeable === false) {
              core.info("Pull request is not mergeable.");
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: "squash",
              });
            } catch (error) {
              if (error.status === 405 || error.status === 409) {
                core.info(`Merge skipped: ${error.message}`);
                return;
              }
              throw error;
            }

      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          script: |
            const pullNumber =
              context.eventName === "workflow_run"
                ? context.payload.workflow_run.pull_requests?.[0]?.number
                : context.payload.pull_request?.number ?? context.payload.review?.pull_request_url?.split("/").pop();

            if (!pullNumber) {
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(pullNumber),
            });

            if (!pr.merged) {
              core.info("Pull request is not merged; branch will not be deleted.");
              return;
            }

            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.info("Head branch belongs to a fork; branch deletion skipped.");
              return;
            }

            if (pr.head.ref === pr.base.ref) {
              core.info("Head branch matches base branch; branch deletion skipped.");
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${pr.head.ref}`,
              });
            } catch (error) {
              if (error.status === 422 || error.status === 404) {
                core.info(`Branch deletion skipped: ${error.message}`);
                return;
              }
              throw error;
            }
